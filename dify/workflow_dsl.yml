    - data:
        code: "function main({ http_body }) {\n    try {\n        // 解析 HTTP 节点传过来的\
          \ JSON 字符串\n        const res = JSON.parse(http_body);\n        const items\
          \ = res.data.items;\n\n        if (!items || items.length === 0) {\n   \
          \         return { result: \"未能获取到有效的行情数据\" };\n        }\n\n        //\
          \ Tushare 数据格式：[\"ts_code\", \"trade_date\", \"open\", \"high\", \"low\"\
          , \"close\", \"vol\"]\n        // 收盘价 close 在索引 5，日期在索引 1\n        let prices\
          \ = [];\n        // 取最近 5 个交易日的数据\n        for(let i = 0; i < Math.min(5,\
          \ items.length); i++) {\n            prices.push({\n                date:\
          \ items[i][1],\n                close: items[i][5]\n            });\n  \
          \      }\n\n        // 计算 5 日均线 (MA5)\n        let sum = 0;\n        prices.forEach(p\
          \ => sum += p.close);\n        let ma5 = (sum / prices.length).toFixed(2);\n\
          \        let latestClose = prices[0].close;\n\n        // 生成给 LLM 看的文字报告\n\
          \        let analysis = `量化数据提取成功：\\n最新收盘价: ${latestClose}\\n5日均线 (MA5):\
          \ ${ma5}\\n`;\n        if (latestClose > ma5) {\n            analysis +=\
          \ \"技术面特征: 当前收盘价已站上5日均线，呈现短期多头排列。\";\n        } else {\n            analysis\
          \ += \"技术面特征: 当前收盘价低于5日均线，呈现短期空头排列。\";\n        }\n\n        return {\n\
          \            result: analysis\n        };\n    } catch (e) {\n        return\
          \ { result: \"数据清洗与计算失败: \" + e.message };\n    }\n}"
