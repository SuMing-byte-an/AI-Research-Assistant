            - 目标标的：{{#1783753345838.stock_symbol#}}\n\n## 任务\n根据量化因子数据，输出一段简短但结构清晰的技术面分析报告。\n\
            \n## 分析规则\n1. **严格基于数据**：只使用系统提供的收盘价、均线等数据，不编造数值。\n2. **空数据处理**：如果量化数据为空或提示\"\
